<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Have a Question... 👀</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .gif-container {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #noBtn {
            background-color: #ced4da;
            color: #495057;
            position: absolute;
            right: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- You can replace this emoji with a cute GIF link if you want! -->
        <div class="gif-container" id="emoji">🥺👉👈</div>
        <h1 id="question">Will you go out on a date with me?</h1>
        <p id="subtext">I promise it'll be fun!</p>

        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Get random positions within the screen boundaries
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            // Switch to fixed positioning so it can fly anywhere on the screen
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            const question = document.getElementById('question');
            const subtext = document.getElementById('subtext');
            const emoji = document.getElementById('emoji');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');

            // Update the content for the success state
            question.innerText = "Yay! It's a date! ❤️";
            subtext.innerText = "I'll text you the details ✨";
            emoji.innerText = "🎉🥳💃";
            
            // Hide the buttons
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
        }
    </script>

</body>
</html>
